<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <!-- add the code of the js here when ready -->
    <title></title>
    <script src="./js/project.js"></script>
  </head>
  <body>
    <header></header>
    <main>
    <canvas id="imgCanvas" width="300" height="200">
    </canvas>
    <br>
    <label for="canvWid">Width:</label>
    <input type="number" id="canvWid" value = "300">
    <label for="canvHei">Height:</label>
    <input type="number" id="canvHei" value = "200">
    <label for="xOffset"> X Offset</label>
    <input type="number" id="xOffset" value = "0">
    <label for="yOffset"> Y Offset</label>
    <input type="number" id="yOffset" value = "0">
    <label for="groundOffset"> Ground Offset</label>
    <input type="number" id="groundOffset" value = "0">
    <label for="groundColor"> Ground Color</label>
    <input type="color" id="groundColor" value = "#0a6666">
    <br>
    <label for="subIterMax">Sub Iteration Max:</label>
    <input type="number" id="subIterMaxVal" min="0" value="3">
    Clear on Set<input type="checkbox" id="clearSub">
    Draw Ground<input type="checkbox" id="drawGround">
    <button type="button" id="submitButton">submit</button>
    <br>The function requestAnimationFrame runs at 60 frames per second. Setting the SubIterationMax variable to 0 will do that.
    <br>Setting it to 3 will have it run at 15 frames per second.
    <br>This sets which animation is viewed.
    <br>
    <select name = "AnimSelectDrop" id="AnimSelect">
    <option = value = "0" selected> Blast Flying Animation</option>
    <option = value = "1"> Sam Walking Animation</option>
    <option = value = "2"> Sam Turning Animation</option>
    <option = value = "3"> Sam Digging Animation</option>
    </select>
  <script>
  init();
  </script>
    </main>
    <footer></footer>
  </body>
</html>
